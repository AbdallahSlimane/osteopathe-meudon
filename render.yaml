services:
  - type: web
    name: osteopathe-meudon
    runtime: static
    # Le site est déjà du HTML statique prêt à servir : pas de build.
    buildCommand: ""
    staticPublishPath: .
    # Redirige les anciennes URL sans .html et gère la page 404
    routes:
      - type: rewrite
        source: /
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
